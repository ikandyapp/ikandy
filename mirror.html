<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IKANDY Mirror</title>
<link rel="icon" href="data:,">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; color: #fff; }
  #v { width: 100%; height: 100%; object-fit: contain; display: block; background: #000; }
  #status {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    background: #000; pointer-events: none;
  }
  #status h2 { font-size: 18px; font-weight: 400; letter-spacing: .15em; color: rgba(255,255,255,.7); }
  #status p  { font-size: 13px; color: rgba(255,255,255,.4); max-width: 600px; text-align: center; padding: 0 40px; }
  .err { color: #ff6b6b !important; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,.3); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity: .3; } 50% { opacity: 1; } }
</style>
</head>
<body>
<video id="v" autoplay muted playsinline></video>
<div id="status">
  <div class="dot"></div>
  <h2 id="status-title">IKANDY MIRROR</h2>
  <p id="status-text">Connecting…</p>
</div>
<script>
  const params  = new URLSearchParams(window.location.search);
  const spanRaw = params.get('span');
  const span    = spanRaw ? JSON.parse(decodeURIComponent(spanRaw)) : null;
  const v       = document.getElementById('v');

  // Fit mode: 'contain' = letterbox (default), 'fill' = stretch
  // Span mode always uses fill since the video is the bounding-box canvas.
  v.style.objectFit = span ? 'fill' : (params.get('fit') || 'contain');

  // Runtime fit toggle from main window UI
  if (window.IKANDY?.onMirrorFit) {
    window.IKANDY.onMirrorFit((mode) => { if (!span) v.style.objectFit = mode; });
  }

  const statusEl = document.getElementById('status');
  const titleEl  = document.getElementById('status-title');
  const textEl   = document.getElementById('status-text');

  function setStatus(title, text, isErr) {
    titleEl.textContent = title;
    textEl.textContent  = text;
    titleEl.classList.toggle('err', !!isErr);
    textEl.classList.toggle('err',  !!isErr);
  }

  // Span: scale & shift video so this monitor shows its slice
  if (span) {
    const { offsetX, offsetY, sliceW, sliceH, totalW, totalH } = span;
    const scaleX = window.innerWidth  / sliceW;
    const scaleY = window.innerHeight / sliceH;
    v.style.position = 'absolute';
    v.style.width  = (totalW * scaleX) + 'px';
    v.style.height = (totalH * scaleY) + 'px';
    v.style.left   = (-offsetX * scaleX) + 'px';
    v.style.top    = (-offsetY * scaleY) + 'px';
  }

  let _reconnecting = false;
  let _reconnectAttempts = 0;
  const MAX_RECONNECTS = 3;

  function scheduleReconnect() {
    if (_reconnectAttempts >= MAX_RECONNECTS) {
      setStatus('STREAM ENDED', 'Could not reconnect after ' + MAX_RECONNECTS + ' attempts', true);
      try { window.IKANDY?.reportMirrorError('stream-ended', 'Max reconnects reached'); } catch {}
      return;
    }
    _reconnectAttempts++;
    const delay = Math.pow(2, _reconnectAttempts - 1) * 1000; // 1s, 2s, 4s
    console.log('[Mirror] reconnect attempt ' + _reconnectAttempts + '/' + MAX_RECONNECTS + ' in ' + delay + 'ms');
    statusEl.style.display = '';
    setStatus('RECONNECTING', 'Attempt ' + _reconnectAttempts + ' of ' + MAX_RECONNECTS + '…');
    setTimeout(start, delay);
  }

  async function start() {
    try {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
        throw new Error('getDisplayMedia not available');
      }
      const stream = await navigator.mediaDevices.getDisplayMedia({
        video: { frameRate: 60 },
        audio: false
      });
      _reconnectAttempts = 0;
      _reconnecting = false;
      v.srcObject = stream;
      v.onplaying = () => { statusEl.style.display = 'none'; };
      v.onerror = (e) => {
        setStatus('VIDEO ERROR', String(e), true);
        try { window.IKANDY?.reportMirrorError('video', String(e)); } catch {}
      };
      stream.getVideoTracks().forEach(t => {
        t.onended = () => {
          if (_reconnecting) return;
          _reconnecting = true;
          scheduleReconnect();
        };
      });
      setTimeout(() => {
        if (statusEl.style.display !== 'none') {
          setStatus('NO VIDEO', 'Stream connected but no frames received', true);
          try { window.IKANDY?.reportMirrorError('no-frames', 'Stream connected but no frames after 5s'); } catch {}
        }
      }, 5000);
    } catch (e) {
      console.error('[Mirror]', e);
      if (_reconnecting) { scheduleReconnect(); return; }
      setStatus('CAPTURE FAILED', e.message || String(e), true);
      try { window.IKANDY?.reportMirrorError('capture-failed', e.message || String(e)); } catch {}
    }
  }
  // Catch any uncaught errors in the mirror window
  window.addEventListener('error', (e) => {
    try { window.IKANDY?.reportMirrorError('uncaught', e.message + ' @ ' + e.filename + ':' + e.lineno); } catch {}
  });
  start();
</script>
</body>
</html>
